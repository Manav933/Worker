services:
  - type: web
    name: worker-management
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn worker_management.wsgi:application --workers 2 --threads 2 --timeout 60 --access-logfile '-' --error-logfile '-'"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: worker_management.settings
      - key: STATIC_URL
        value: /static/
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHONUNBUFFERED
        value: "1"
    staticPublishPath: ./staticfiles
    disk:
      name: static
      mountPath: /opt/render/project/src/static
      sizeGB: 1
    healthCheckPath: /admin/login/ 